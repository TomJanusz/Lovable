# Collectify CI Pipeline
# Triggered on: pull_request, push to dev/preprod/main

name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]
permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # Backend CI
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  # Frontend CI
  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test

  # Build Docker images
  build-images:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t collectify-api:ci ./server

      - name: Build frontend image
        run: docker build -t collectify-web:ci -f client/Dockerfile .
  promote-to-preprod:
    name: Promote to Preprod
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test, build-images]
    if: github.ref == 'refs/heads/dev'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # important pour push

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push dev → preprod
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git fetch origin preprod
          git checkout preprod
          git merge origin/dev --no-ff -m "Promote dev → preprod [CI]"
          git push origin preprod